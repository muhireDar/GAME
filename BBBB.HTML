<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RWANDAN KING Puzzle</title>

    <style>
      body {
        font-family: Arial;
        text-align: center;
        background: orange;
        color: black;
      }

      h1 {
        margin-top: 30px;
      }

      #board {
        width: 300px;
        height: 300px;
        margin: 20px auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
      }

      .tile {
        width: 100px;
        height: 100px;
        background-image: url("image.jpg"); /* YOUR IMAGE */
        background-size: 300px 300px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        cursor: pointer;
      }

      .empty {
        background: rgb(255, 255, 255);
      }

      button {
        padding: 10px 20px;

        background: rgb(31, 15, 255);
        font-weight: bold;
        cursor: pointe;
      }
    </style>
  </head>

  <body>
    <h1>RWANDAN KING</h1>
    <hr />

    <div id="board"></div>

    <button onclick="startGame()">Restart</button>

    <script>
      let tiles = [];
      let emptyIndex = 8;

      // START GAME
      function startGame() {
        tiles = [1, 2, 3, 4, 5, 6, 7, 8, 0];
        shuffle();
        draw();
      }

      // SHUFFLE TILES
      function shuffle() {
        do {
          for (let i = tiles.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
          }
        } while (!isSolvable());

        emptyIndex = tiles.indexOf(0);
      }

      // CHECK SOLVABLE
      function isSolvable() {
        let inversions = 0;
        for (let i = 0; i < 8; i++) {
          for (let j = i + 1; j < 9; j++) {
            if (tiles[i] && tiles[j] && tiles[i] > tiles[j]) {
              inversions++;
            }
          }
        }
        return inversions % 2 === 0;
      }

      // DRAW BOARD
      function draw() {
        const board = document.getElementById("board");
        board.innerHTML = "";

        tiles.forEach((value, index) => {
          const tile = document.createElement("div");
          tile.classList.add("tile");

          if (value === 0) {
            tile.classList.add("empty");
          } else {
            let x = (value - 1) % 3;
            let y = Math.floor((value - 1) / 3);

            tile.style.backgroundPosition = `-${x * 100}px -${y * 100}px`;
            tile.innerText = value;

            tile.onclick = () => moveTile(index);
          }

          board.appendChild(tile);
        });
      }

      // MOVE TILE
      function moveTile(index) {
        const possibleMoves = [
          emptyIndex - 1,
          emptyIndex + 1,
          emptyIndex - 3,
          emptyIndex + 3,
        ];

        if (possibleMoves.includes(index)) {
          [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
          emptyIndex = index;
          draw();
          checkWin();
        }
      }

      // CHECK WIN
      function checkWin() {
        for (let i = 0; i < 8; i++) {
          if (tiles[i] !== i + 1) return;
        }

        setTimeout(() => {
          alert("🎉 Congratulations! You solved the puzzle!");
        }, 200);
      }

      // START FIRST TIME
      startGame();
    </script>
  </body>
</html>
